services:
  openclaw-postgres:
    image: postgres:16
    container_name: openclaw-postgres
    environment:
      POSTGRES_DB: openclaw_dev
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: openclaw_dev_password
    ports:
      - "55432:5432"
    volumes:
      - openclaw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  openclaw_postgres_data:
